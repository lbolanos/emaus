name: Deploy to Production

on:
  push:
    branches: [master]

permissions:
  contents: write
  actions: read

jobs:
  # Step 1: Build & Test in GitHub Actions
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run tests
        run: pnpm test:field-mapping

      - name: Build application
        run: pnpm build
        env:
          VITE_API_URL: https://emaus.cc/api
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: apps
          retention-days: 1

  # Step 2: Deploy to Lightsail
  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./build-output

      - name: Deploy to Lightsail
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: |
          set -e

          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$LIGHTSAIL_SSH_PRIVATE_KEY" > ~/.ssh/lightsail-emaus.pem
          chmod 600 ~/.ssh/lightsail-emaus.pem

          # Add host key
          ssh-keyscan -H $LIGHTSAIL_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # List build output structure for debugging
          echo "Build output structure:"
          find ./build-output -maxdepth 3 -type d | head -20

          # Clean old assets before uploading (prevents Permission denied on stale files)
          echo "Cleaning old web assets on server..."
          ssh -i ~/.ssh/lightsail-emaus.pem ubuntu@$LIGHTSAIL_HOST << 'CLEANEOF'
          set -e
          # Fresh Lightsail host has /var/www/emaus owned by www-data
          # (setup-aws.sh default). Give ubuntu write access to the top-level
          # + dist dirs + root config files we scp into. File mode stays 644,
          # so nginx (www-data) can still read everything.
          sudo mkdir -p /var/www/emaus/apps/web/dist /var/www/emaus/apps/api/dist
          sudo chown ubuntu:ubuntu /var/www/emaus
          sudo chown -R ubuntu:ubuntu /var/www/emaus/apps/web/dist /var/www/emaus/apps/api/dist
          for f in package.json pnpm-lock.yaml pnpm-workspace.yaml; do
            [ -e "/var/www/emaus/$f" ] && sudo chown ubuntu:ubuntu "/var/www/emaus/$f" || true
          done

          ASSETS_DIR="/var/www/emaus/apps/web/dist/assets"
          if [ -d "$ASSETS_DIR" ]; then
            rm -rf "$ASSETS_DIR"
            mkdir -p "$ASSETS_DIR"
            echo "✅ Cleaned assets directory"
          fi
          CLEANEOF

          # Upload new artifacts
          echo "Uploading API build..."
          if [ -d "./build-output/api/dist" ]; then
            scp -i ~/.ssh/lightsail-emaus.pem -r ./build-output/api/dist ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/api/
          elif [ -d "./build-output/apps/api/dist" ]; then
            scp -i ~/.ssh/lightsail-emaus.pem -r ./build-output/apps/api/dist ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/api/
          else
            echo "Warning: API dist not found, looking for alternatives..."
            find ./build-output -name "index.js" -path "*/api/dist/*"
          fi

          echo "Uploading Web build..."
          if [ -d "./build-output/web/dist" ]; then
            scp -i ~/.ssh/lightsail-emaus.pem -r ./build-output/web/dist ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/web/
          elif [ -d "./build-output/apps/web/dist" ]; then
            scp -i ~/.ssh/lightsail-emaus.pem -r ./build-output/apps/web/dist ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/web/
          else
            echo "Warning: Web dist not found"
          fi

          # Upload package.json files and lockfile so pnpm install picks up new dependencies
          echo "Syncing package.json and lockfile..."
          scp -i ~/.ssh/lightsail-emaus.pem ./build-output/api/package.json ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/api/package.json 2>/dev/null || \
          scp -i ~/.ssh/lightsail-emaus.pem ./build-output/apps/api/package.json ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/api/package.json 2>/dev/null || \
          echo "Warning: API package.json not found in artifacts"
          scp -i ~/.ssh/lightsail-emaus.pem ./build-output/web/package.json ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/web/package.json 2>/dev/null || \
          scp -i ~/.ssh/lightsail-emaus.pem ./build-output/apps/web/package.json ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/web/package.json 2>/dev/null || \
          echo "Warning: Web package.json not found in artifacts"

          # Upload root package.json and lockfile from checkout
          scp -i ~/.ssh/lightsail-emaus.pem package.json ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/package.json
          scp -i ~/.ssh/lightsail-emaus.pem pnpm-lock.yaml ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/pnpm-lock.yaml
          scp -i ~/.ssh/lightsail-emaus.pem pnpm-workspace.yaml ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/pnpm-workspace.yaml

          # Generate runtime-config.js with secrets and upload it
          echo "Generating runtime-config.js..."
          API_URL="https://${DOMAIN_NAME:-emaus.cc}/api"
          echo 'window.EMAUS_RUNTIME_CONFIG = {' > /tmp/runtime-config.js
          echo "  apiUrl: '${API_URL}'," >> /tmp/runtime-config.js
          echo "  googleMapsApiKey: '${GOOGLE_MAPS_API_KEY}'," >> /tmp/runtime-config.js
          echo "  recaptchaSiteKey: '${RECAPTCHA_SITE_KEY}'," >> /tmp/runtime-config.js
          echo "  environment: 'production'," >> /tmp/runtime-config.js
          echo "  isDevelopment: false," >> /tmp/runtime-config.js
          echo "  isStaging: false," >> /tmp/runtime-config.js
          echo "  isProduction: true," >> /tmp/runtime-config.js
          echo '};' >> /tmp/runtime-config.js
          echo "console.log('[CONFIG] Production runtime configuration loaded');" >> /tmp/runtime-config.js
          scp -i ~/.ssh/lightsail-emaus.pem /tmp/runtime-config.js ubuntu@$LIGHTSAIL_HOST:/var/www/emaus/apps/web/dist/runtime-config.js
          echo "runtime-config.js uploaded"

          # Snapshot current version for rollback
          echo "Creating rollback snapshot..."
          ssh -i ~/.ssh/lightsail-emaus.pem ubuntu@$LIGHTSAIL_HOST << 'SNAPSHOTEOF'
          set -e
          PREV_DIR="/var/www/emaus/previous"
          rm -rf "$PREV_DIR"
          mkdir -p "$PREV_DIR"
          cp -r /var/www/emaus/apps/api/dist "$PREV_DIR/api-dist" 2>/dev/null || true
          cp -r /var/www/emaus/apps/web/dist "$PREV_DIR/web-dist" 2>/dev/null || true
          cp /var/www/emaus/apps/api/package.json "$PREV_DIR/api-package.json" 2>/dev/null || true
          cp /var/www/emaus/apps/web/package.json "$PREV_DIR/web-package.json" 2>/dev/null || true
          cp /var/www/emaus/package.json "$PREV_DIR/root-package.json" 2>/dev/null || true
          cp /var/www/emaus/pnpm-lock.yaml "$PREV_DIR/pnpm-lock.yaml" 2>/dev/null || true
          cp /var/www/emaus/pnpm-workspace.yaml "$PREV_DIR/pnpm-workspace.yaml" 2>/dev/null || true
          git -C /var/www/emaus rev-parse HEAD > "$PREV_DIR/git-commit.txt" 2>/dev/null || true
          date -u > "$PREV_DIR/snapshot-timestamp.txt"
          echo "Rollback snapshot saved to $PREV_DIR"
          SNAPSHOTEOF

          # Backup database before deploy
          echo "Creating database backup..."
          ssh -i ~/.ssh/lightsail-emaus.pem ubuntu@$LIGHTSAIL_HOST << 'BACKUPEOF'
          set -e
          DB_PATH="/var/www/emaus/apps/api/database.sqlite"
          BACKUP_DIR="/var/backups/emaus"
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          BACKUP_FILE="$BACKUP_DIR/emaus_${TIMESTAMP}.sqlite"

          sudo mkdir -p $BACKUP_DIR
          sudo chown $USER:$USER $BACKUP_DIR

          if [ -f "$DB_PATH" ]; then
            sqlite3 $DB_PATH ".backup $BACKUP_FILE"
            gzip $BACKUP_FILE
            echo "✅ Backup created: ${BACKUP_FILE}.gz ($(du -h ${BACKUP_FILE}.gz | cut -f1))"
            # Keep last 30 days of backups
            find $BACKUP_DIR -name "*.gz" -type f -mtime +30 -delete
          else
            echo "⚠️ No database found, skipping backup"
          fi
          BACKUPEOF

          # Deploy, restart, and validate application
          ssh -i ~/.ssh/lightsail-emaus.pem ubuntu@$LIGHTSAIL_HOST << 'RESTARTEOF'
          set -e
          cd /var/www/emaus

          echo "Installing dependencies..."
          pnpm install --frozen-lockfile 2>&1 | tail -10

          echo "Running migrations..."
          pnpm --filter api migration:run 2>&1 | tail -5 || echo "Migrations skipped"

          # Orphan :3001 guard — see LIGHTSAIL_MIGRATION_NOTES.md §11.
          # If a non-PM2 process is holding :3001, pm2 restart crash-loops on
          # EADDRINUSE while the orphan keeps serving stale code (healthcheck
          # still returns 200, so the failure is silent). Kill it so PM2 can
          # bind the port and run the freshly-deployed dist.
          ORPHAN_PID=$(sudo ss -tlnp 2>/dev/null | awk '/LISTEN/ && /:3001 / {if (match($0, /pid=[0-9]+/)) print substr($0, RSTART+4, RLENGTH-4); exit}')
          if [ -n "$ORPHAN_PID" ]; then
            if pm2 jlist 2>/dev/null | grep -q "\"pid\":$ORPHAN_PID"; then
              echo "✓ :3001 held by PM2-managed PID $ORPHAN_PID"
            else
              echo "⚠ :3001 held by orphan PID $ORPHAN_PID — terminating before pm2 restart"
              sudo kill -TERM "$ORPHAN_PID" || true
              for _ in 1 2 3 4 5 6 7 8; do
                sleep 1
                sudo kill -0 "$ORPHAN_PID" 2>/dev/null || break
              done
              if sudo kill -0 "$ORPHAN_PID" 2>/dev/null; then
                echo "Orphan did not exit on SIGTERM, escalating to SIGKILL"
                sudo kill -KILL "$ORPHAN_PID" || true
                sleep 2
              fi
            fi
          fi

          echo "Restarting PM2..."
          pm2 restart emaus-api
          sleep 3

          echo "Checking PM2 status..."
          pm2 status emaus-api

          # Health check from inside the box (Cloudflare Bot Fight Mode
          # blocks curl from GitHub Actions runner IPs as bots, so we
          # validate via localhost instead).
          echo "Validating API via localhost..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health || echo 000)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API is healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE - retrying in 3s..."
            sleep 3
          done

          echo "❌ API did not respond with 200 after 5 attempts"
          pm2 logs emaus-api --lines 30 --nostream || true
          exit 1
          RESTARTEOF

      - name: Public URL smoke test (non-fatal)
        if: success()
        run: |
          # Cloudflare Bot Fight Mode may 403 this from GitHub Actions IPs;
          # treated as informational. The real health check runs on-box
          # during the deploy SSH session above.
          echo "Smoke-testing public URL..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0 (compatible; GitHubActions-SmokeTest)" https://emaus.cc/api/health || echo 000)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Public endpoint reachable (HTTP 200)"
          else
            echo "ℹ️  Public endpoint returned HTTP $HTTP_CODE (likely Cloudflare bot challenge; on-box health already verified)"
          fi

      - name: Deployment notification
        run: |
          echo "✅ Deployment Successful!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Application: https://${{ secrets.DOMAIN_NAME }}"

      - name: Handle deployment failure
        if: failure()
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
        run: |
          echo "❌ Deployment failed. Checking Lightsail status..."

          mkdir -p ~/.ssh
          echo "$LIGHTSAIL_SSH_PRIVATE_KEY" > ~/.ssh/lightsail-emaus.pem
          chmod 600 ~/.ssh/lightsail-emaus.pem

          ssh-keyscan -H $LIGHTSAIL_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # Attempt to get diagnostic information
          ssh -i ~/.ssh/lightsail-emaus.pem \
            $LIGHTSAIL_USER@$LIGHTSAIL_HOST \
            "pm2 status; echo '---'; tail -50 /tmp/deployment.log 2>/dev/null || echo 'Deployment log not found'" \
            2>&1 || echo "Could not retrieve diagnostic info"

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: artifacts/
          retention-days: 30

  # Step 3: Deployment summary
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 Production Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | https://${{ secrets.DOMAIN_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The application has been successfully deployed to production with S3 multi-purpose bucket support." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The deployment encountered an error. Please review the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          fi
